<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="580" fill="#F7F7F5"/>

  <text x="60" y="40" fill="#737373" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" letter-spacing="1.9">DIA 2 · FERRAMENTAS POR ESTÁGIO</text>
  <text x="60" y="76" fill="#1A1A1A" font-size="28" font-weight="500" letter-spacing="-0.4">Quais agentes e comandos usar em cada estágio</text>

  <!-- 4 columns, one per stage -->
  <!-- col width 250, gap 30, total 4*250 + 3*30 = 1090, start x=55 -->

  <!-- Stage 1 -->
  <g transform="translate(55, 130)">
    <rect width="250" height="380" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
    <rect x="0" y="0" width="250" height="6" fill="#F25022"/>
    <text x="18" y="38" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">ESTÁGIO 01</text>
    <text x="18" y="68" fill="#1A1A1A" font-size="20" font-weight="500">Arqueologia</text>
    <text x="18" y="92" fill="#737373" font-family="JetBrains Mono, monospace" font-size="11">11:00 – 14:00</text>

    <line x1="18" y1="110" x2="232" y2="110" stroke="#E5E5E0" stroke-width="1"/>

    <text x="18" y="138" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">AGENTE</text>
    <text x="18" y="158" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">@archaeologist</text>

    <text x="18" y="192" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">COMANDOS-CHAVE</text>
    <text x="18" y="212" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/archaeology-kickoff</text>
    <text x="18" y="230" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/catalog-mysteries</text>
    <text x="18" y="248" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/extract-business-rules</text>
    <text x="18" y="266" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/map-dependencies</text>
    <text x="18" y="284" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/discovery-report</text>

    <text x="18" y="318" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">ENTREGA</text>
    <text x="18" y="338" fill="#737373" font-size="12">Glossário + catálogo BR</text>
    <text x="18" y="356" fill="#737373" font-size="12">+ mapa deps + mistérios</text>
  </g>

  <!-- Stage 2 -->
  <g transform="translate(335, 130)">
    <rect width="250" height="380" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
    <rect x="0" y="0" width="250" height="6" fill="#00A4EF"/>
    <text x="18" y="38" fill="#0076AC" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">ESTÁGIO 02</text>
    <text x="18" y="68" fill="#1A1A1A" font-size="20" font-weight="500">Spec Moderna</text>
    <text x="18" y="92" fill="#737373" font-family="JetBrains Mono, monospace" font-size="11">14:00 – 15:00</text>

    <line x1="18" y1="110" x2="232" y2="110" stroke="#E5E5E0" stroke-width="1"/>

    <text x="18" y="138" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">AGENTE</text>
    <text x="18" y="158" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">@architect</text>

    <text x="18" y="192" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">SPEC-KIT</text>
    <text x="18" y="212" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.specify</text>
    <text x="18" y="230" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.clarify</text>
    <text x="18" y="248" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.plan</text>

    <text x="18" y="282" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">COMANDOS-CHAVE</text>
    <text x="18" y="302" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/write-ears-spec</text>
    <text x="18" y="320" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/carve-bounded-contexts</text>
    <text x="18" y="338" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/generate-adr</text>

    <text x="18" y="370" fill="#737373" font-size="12">Entrega: spec EARS + ADRs</text>
  </g>

  <!-- Stage 3 -->
  <g transform="translate(615, 130)">
    <rect width="250" height="380" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
    <rect x="0" y="0" width="250" height="6" fill="#7FBA00"/>
    <text x="18" y="38" fill="#5A8500" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">ESTÁGIO 03</text>
    <text x="18" y="68" fill="#1A1A1A" font-size="20" font-weight="500">Implementação</text>
    <text x="18" y="92" fill="#737373" font-family="JetBrains Mono, monospace" font-size="11">15:00 – 16:10</text>

    <line x1="18" y1="110" x2="232" y2="110" stroke="#E5E5E0" stroke-width="1"/>

    <text x="18" y="138" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">AGENTE</text>
    <text x="18" y="158" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">@builder</text>

    <text x="18" y="192" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">SPEC-KIT</text>
    <text x="18" y="212" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.tasks</text>
    <text x="18" y="230" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.implement</text>
    <text x="18" y="248" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/speckit.analyze</text>

    <text x="18" y="282" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">COMANDOS-CHAVE</text>
    <text x="18" y="302" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/translate-natural-to-java</text>
    <text x="18" y="320" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/generate-jpa-from-fdt</text>
    <text x="18" y="338" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/generate-equivalence-tests</text>

    <text x="18" y="370" fill="#737373" font-size="12">Entrega: código + testes</text>
  </g>

  <!-- Stage 4 -->
  <g transform="translate(895, 130)">
    <rect width="250" height="380" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
    <rect x="0" y="0" width="250" height="6" fill="#FFB900"/>
    <text x="18" y="38" fill="#B88500" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">ESTÁGIO 04</text>
    <text x="18" y="68" fill="#1A1A1A" font-size="20" font-weight="500">Evolução</text>
    <text x="18" y="92" fill="#737373" font-family="JetBrains Mono, monospace" font-size="11">16:10 – 16:50</text>

    <line x1="18" y1="110" x2="232" y2="110" stroke="#E5E5E0" stroke-width="1"/>

    <text x="18" y="138" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">AGENTE</text>
    <text x="18" y="158" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">@evolution</text>

    <text x="18" y="192" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">COMANDOS-CHAVE</text>
    <text x="18" y="212" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/write-github-issue</text>
    <text x="18" y="230" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/delegate-to-copilot</text>
    <text x="18" y="248" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/review-agent-pr</text>
    <text x="18" y="266" fill="#1A1A1A" font-family="JetBrains Mono, monospace" font-size="12">/final-experience-report</text>

    <text x="18" y="300" fill="#737373" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="1.2">COPILOT AGENT MODE</text>
    <text x="18" y="320" fill="#737373" font-size="12">Issue → PR autônomo →</text>
    <text x="18" y="338" fill="#737373" font-size="12">revisão humana</text>

    <text x="18" y="370" fill="#737373" font-size="12">Entrega: Issue + PR + relatório</text>
  </g>

  <!-- H1, H2, H3 between stages -->
  <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" letter-spacing="0.5" text-anchor="middle">
    <text x="320" y="316" fill="#737373">H1 →</text>
    <text x="600" y="316" fill="#737373">H2 →</text>
    <text x="880" y="316" fill="#737373">H3 →</text>
  </g>

  <text x="60" y="552" fill="#737373" font-size="13">Cada estágio tem o agente que coordena + os comandos slash que produzem o entregável da etapa. Personas usam ambos.</text>
</svg>
